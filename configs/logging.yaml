# DesktopPet 日志配置

version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s | %(levelname)-8s | %(name)-20s | %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  detailed:
    format: '%(asctime)s | %(levelname)-8s | %(name)-20s | %(filename)s:%(lineno)d | %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: '%(asctime)s %(name)s %(levelname)s %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/desktop-pet.log
    maxBytes: 10485760   # 10MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 3
    encoding: utf8

loggers:
  desktop_pet:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false

  desktop_pet.llm:
    level: DEBUG
    handlers: [file]
    propagate: false

  desktop_pet.perception:
    level: INFO
    handlers: [file]
    propagate: false

  desktop_pet.ui:
    level: INFO
    handlers: [file]
    propagate: false

root:
  level: INFO
  handlers: [console, file]
